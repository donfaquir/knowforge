name: 功能建议
description: 提议新功能或改进现有能力
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出建议。若涉及较大方向变更，可先开 Discussion 或在 Issue 中说明动机与取舍。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 用户场景或当前痛点
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望的行为或实现思路（可选）
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案（可选）
    validations:
      required: false
